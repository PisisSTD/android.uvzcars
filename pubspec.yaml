name: diplomdev
description: "грузоперевозки увз"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.10.8 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_messaging: ^16.4.1
  intl: ^0.20.3
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  googleapis_auth: ^2.3.1
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  
  # Пакеты для МЕДИА-МОНСТРА
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  path_provider: ^2.1.3
  dio: ^5.5.0
  camera: ^0.12.0+1
  video_player: ^2.8.1
  record: ^6.2.1
  audioplayers: ^6.7.1
  permission_handler: ^12.0.3
  flutter_cache_manager: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/service-account.json
